<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fake News Detector</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="card">
    <h1>📰 Fake News Detector</h1>
    <p>Paste news content below and click <b>Check</b></p>

    <textarea id="news" placeholder="Paste news text here..."></textarea>

    <button id="btn">Check</button>

    <div id="result"></div>

    <div class="line"></div>

    <div id="history"></div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
